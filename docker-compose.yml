networks:
  flixbd_net:
    driver: bridge
    name: flixbd_net

services:
  db:
    image: postgres:16-alpine
    container_name: flixbd_db
    restart: always
    networks:
      - flixbd_net
    environment:
      POSTGRES_USER: flixbd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flixbd_local_dev}
      POSTGRES_DB: flixbd
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flixbd -d flixbd"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    image: flixbd-app:local
    pull_policy: build
    container_name: flixbd_app
    networks:
      - flixbd_net
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - flixbd_media:/app/media
    environment:
      - DATABASE_URL=postgresql://flixbd:${POSTGRES_PASSWORD:-flixbd_local_dev}@db:5432/flixbd?sslmode=disable
    restart: always

  worker:
    image: flixbd-app:local
    pull_policy: never
    container_name: flixbd_worker
    networks:
      - flixbd_net
    command: >
      sh -c "python manage.py migrate --noinput && exec python manage.py qcluster"
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - flixbd_media:/app/media
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://flixbd:${POSTGRES_PASSWORD:-flixbd_local_dev}@db:5432/flixbd?sslmode=disable
    restart: always

volumes:
  flixbd_media:
  postgres_data: