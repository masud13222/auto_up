<div id="steps-2-3" class="space-y-8 animate-in fade-in duration-500">
    <!-- Step 2: Auth URL -->
    <div class="space-y-4 p-6 bg-blue-500/5 rounded-2xl border border-blue-500/20">
        <label class="text-sm font-bold text-blue-400 uppercase tracking-widest flex items-center gap-2">
            <span class="bg-blue-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
            Authorize App
        </label>
        <p class="text-sm text-gray-400">নিচের বাটনে ক্লিক করে ব্রাউজারে লগইন করুন এবং রিডাইরেক্ট হওয়া URL টা অ্যাড্রেস বার থেকে কপি করুন।</p>
        <a href="{{ auth_url }}" target="_blank" 
           class="inline-block w-full text-center bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg ring-2 ring-indigo-500/30 transition-all transform hover:scale-[1.01]">
            Open Authorization Page (New Tab)
        </a>
    </div>

    <!-- Step 3: Callback -->
    <div class="space-y-4">
        <label class="text-sm font-bold text-green-400 uppercase tracking-widest flex items-center gap-2">
            <span class="bg-green-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">3</span>
            Paste Redirected URL
        </label>
        <p class="text-xs text-gray-400 mb-2">ব্রাউজার থেকে কপি করা সেই <code>http://localhost/?code=...</code> লিঙ্কটি এখানে দিন।</p>
        <input type="text" name="response_url" required
               placeholder="Paste the localhost URL from browser here..." 
               class="w-full bg-black/40 border border-gray-700 rounded-xl px-4 py-4 outline-none focus:border-green-500 font-mono text-sm placeholder:text-gray-600">
        
        <!-- Standard Submit to handle File Download -->
        <button type="submit" name="generate_token" 
                class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-5 rounded-xl shadow-xl transition-all transform hover:-translate-y-1">
            Generate and Download token.json
        </button>
    </div>
</div>
