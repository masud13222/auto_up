<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlixBD{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0e0e0e; color: #d4d4d4; }
        .sidebar-link { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; color:#6b6b6b; font-size:13px; font-weight:500; transition:all .15s; text-decoration:none; }
        .sidebar-link:hover { background:#1a1a1a; color:#a3a3a3; }
        .sidebar-link.active { background:#1a1a1a; color:#f97316; }
        .card { background:#161616; border:1px solid #1e1e1e; border-radius:12px; }
        input:focus, select:focus { outline:none; border-color:#f97316 !important; }
        .accent { color: #f97316; }
        .btn-primary { background:#f97316; color:#000; font-weight:600; }
        .btn-primary:hover { background:#fb923c; }
    </style>
</head>
<body class="min-h-screen" x-data="{ drawer: false }">

<!-- Mobile Overlay -->
<div x-show="drawer" x-transition.opacity @click="drawer=false"
     class="fixed inset-0 bg-black/60 z-40 lg:hidden"></div>

<!-- Sidebar -->
<aside :class="drawer ? 'translate-x-0' : '-translate-x-full'"
       class="fixed inset-y-0 left-0 w-56 bg-[#121212] border-r border-[#1e1e1e] z-50 flex flex-col transition-transform lg:translate-x-0">

    <div class="h-14 flex items-center gap-2.5 px-4 border-b border-[#1e1e1e]">
        <div class="w-7 h-7 rounded-lg bg-[#f97316] flex items-center justify-center">
            <span class="text-black text-xs font-bold">F</span>
        </div>
        <span class="text-sm font-bold text-white tracking-tight">FlixBD</span>
    </div>

    <nav class="flex-1 p-2.5 space-y-0.5 overflow-y-auto">
        <a href="{% url 'panel:dashboard' %}" class="sidebar-link {% block nav_dashboard %}{% endblock %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Dashboard
        </a>
        <a href="{% url 'panel:process' %}" class="sidebar-link {% block nav_process %}{% endblock %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
            Process Movie
        </a>
        <a href="{% url 'panel:queue' %}" class="sidebar-link {% block nav_queue %}{% endblock %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            Queue
        </a>

        <div class="pt-4 pb-1 px-2"><p class="text-[10px] font-semibold uppercase tracking-widest text-[#333]">Config</p></div>

        <a href="{% url 'panel:settings' %}" class="sidebar-link {% block nav_settings %}{% endblock %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Settings
        </a>
        <a href="{% url 'panel:google_accounts' %}" class="sidebar-link {% block nav_accounts %}{% endblock %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            Google Accounts
        </a>
        <a href="{% url 'panel:llm_settings' %}" class="sidebar-link {% block nav_llm %}{% endblock %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
            LLM
        </a>

        <div class="pt-3">
            <a href="{% url 'panel:logout' %}" class="sidebar-link text-red-500/50 hover:text-red-400 hover:bg-red-500/5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </a>
        </div>
    </nav>
</aside>

<!-- Main -->
<div class="lg:ml-56 min-h-screen flex flex-col">
    <header class="h-14 border-b border-[#1e1e1e] flex items-center justify-between px-4 sticky top-0 bg-[#0e0e0e] z-30">
        <div class="flex items-center gap-3">
            <button @click="drawer=true" class="lg:hidden p-1.5 rounded-lg hover:bg-[#1a1a1a]">
                <svg class="w-5 h-5 text-[#666]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h2 class="text-sm font-semibold text-white">{% block page_title %}Dashboard{% endblock %}</h2>
        </div>
    </header>
    <main class="flex-1 p-4 md:p-6">{% block content %}{% endblock %}</main>
</div>
</body>
</html>
