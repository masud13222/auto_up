{% if processing_count > 0 %}
<span id="queue-status" hx-get="{% url 'panel:queue_status_api' %}" hx-trigger="every 5s" hx-swap="outerHTML"
      class="text-xs bg-orange-500/10 text-[#f97316] border border-orange-500/20 rounded-full px-3 py-1 font-medium">
    {{ processing_count }} running
</span>
{% elif pending_count > 0 %}
<span id="queue-status" hx-get="{% url 'panel:queue_status_api' %}" hx-trigger="every 5s" hx-swap="outerHTML"
      class="text-xs bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full px-3 py-1 font-medium">
    {{ pending_count }} queued
</span>
{% else %}
<span id="queue-status" hx-get="{% url 'panel:queue_status_api' %}" hx-trigger="every 5s" hx-swap="outerHTML"
      class="text-xs text-[#444] bg-[#161616] border border-[#1e1e1e] rounded-full px-3 py-1">
    Idle
</span>
{% endif %}
